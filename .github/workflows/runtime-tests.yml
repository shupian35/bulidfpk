name: Runtime template tests

on:
  push:
    paths:
      - fnpack/AniRSS/cmd/**
      - tests/**
      - .github/workflows/runtime-tests.yml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check shell syntax
        run: bash -n fnpack/AniRSS/cmd/main
      - name: Test UTF-8 runtime locale
        run: bash tests/test-main-locale.sh