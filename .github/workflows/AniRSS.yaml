name: AniRSS Build & Release

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: '上游版本（留空自动取 latest release tag；想重打历史版本就填具体版本号，例如 3.1.74）'
        required: false
        default: ""
        type: string
      manifest_version:
        description: 'manifest 版本号（留空默认 ${UPSTREAM}-1，重发布时填 -2 / -3）'
        required: false
        default: ""
        type: string
      changelog:
        description: '更新日志（留空用上游 release body）'
        required: false
        default: ""
        type: string
      publish:
        description: '是否发布到 FnDepot（仅当 secrets.BUILDBOT 已配置时有效）'
        required: false
        default: true
        type: boolean
      force:
        description: '强制构建（忽略版本对比）'
        required: false
        default: false
        type: boolean

concurrency:
  group: anirss-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    name: 检查上游版本
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      upstream_version: ${{ steps.fetch.outputs.upstream_version }}
      manifest_version: ${{ steps.calc.outputs.manifest_version }}
      changelog: ${{ steps.fetch.outputs.changelog }}
      asset_url: ${{ steps.fetch.outputs.asset_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 安装 jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 读取上次构建版本
        id: last
        run: |
          LAST=""
          if [ -f fnpack/AniRSS/.last_built_version ]; then
            LAST=$(cat fnpack/AniRSS/.last_built_version | tr -d '[:space:]')
          fi
          echo "last=$LAST" >> $GITHUB_OUTPUT
          echo "Last built version: ${LAST:-<none>}"

      - name: 获取上游最新 release
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            TAG="v$INPUT_VERSION"
            UPSTREAM_VERSION="$INPUT_VERSION"
          else
            TAG=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/wushuo894/ani-rss/releases/latest \
              | jq -r '.tag_name // empty')
            if [ -z "$TAG" ]; then
              echo "::error::无法获取 wushuo894/ani-rss 的 latest release"
              exit 1
            fi
            UPSTREAM_VERSION="${TAG#v}"
          fi
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "Upstream tag: $TAG"

          BODY=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/wushuo894/ani-rss/releases/tags/$TAG" \
            | jq -r '.body // ""')
          {
            echo "changelog<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          ASSET_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/wushuo894/ani-rss/releases/tags/$TAG" \
            | jq -r '.assets[]? | select(.name=="ani-rss.jar") | .browser_download_url')
          if [ -z "$ASSET_URL" ]; then
            echo "::error::未在 $TAG 找到 ani-rss.jar 资产"
            exit 1
          fi
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT

      - name: 对比版本决定是否构建
        id: compare
        env:
          LAST: ${{ steps.last.outputs.last }}
          UPSTREAM: ${{ steps.fetch.outputs.upstream_version }}
          FORCE: ${{ github.event.inputs.force }}
          EVENT: ${{ github.event.name }}
        run: |
          SHOULD="false"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            SHOULD="true"; REASON="manual dispatch"
          elif [ "$FORCE" = "true" ]; then
            SHOULD="true"; REASON="force flag"
          elif [ -z "$LAST" ]; then
            SHOULD="true"; REASON="no prior build"
          elif [ "$LAST" = "$UPSTREAM" ]; then
            SHOULD="false"; REASON="upstream $UPSTREAM already built"
          else
            SHOULD="true"; REASON="new version $UPSTREAM > $LAST"
          fi
          echo "should_build=$SHOULD" >> $GITHUB_OUTPUT
          echo "Decision: $REASON"

      - name: 计算 manifest_version
        id: calc
        if: steps.compare.outputs.should_build == 'true'
        env:
          INPUT_MV: ${{ github.event.inputs.manifest_version }}
          UPSTREAM: ${{ steps.fetch.outputs.upstream_version }}
        run: |
          if [ -n "$INPUT_MV" ]; then
            MV="$INPUT_MV"
          else
            MV="${UPSTREAM}-1"
          fi
          echo "manifest_version=$MV" >> $GITHUB_OUTPUT
          echo "manifest_version: $MV"

  build:
    name: 打 fpk
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          path: buildbot_repo

      - name: 下载 ani-rss.jar
        run: |
          URL="${{ needs.check.outputs.asset_url }}"
          wget -q "$URL" -O ani-rss.jar
          ls -lh ani-rss.jar

      - name: 准备 fnpack 工具和模板
        run: |
          mkdir -p build_workspace
          cp -r "buildbot_repo/fnpack/AniRSS" build_workspace/
          cp "buildbot_repo/fnpack/fnpack-1.2.1-linux-amd64" build_workspace/fnpack
          chmod +x build_workspace/fnpack

      - name: 把 ani-rss.jar 复制到 app/app_tmp
        run: |
          APP_DIR="build_workspace/AniRSS/app/app_tmp"
          mkdir -p "$APP_DIR"
          find "$APP_DIR" -mindepth 1 -not -name '.keep' -delete
          cp ani-rss.jar "$APP_DIR/ani-rss.jar"

      - name: 修改 manifest 文件
        run: |
          MANIFEST_PATH="build_workspace/AniRSS/manifest"
          MV="${{ needs.check.outputs.manifest_version }}"
          CHANGELOG="${{ needs.check.outputs.changelog }}"
          sudo apt-get update && sudo apt-get install -y jq
          ESCAPED_CHANGELOG=$(printf '%s' "$CHANGELOG" | jq -sRr @json)
          sed -i "s/\${VERSION}/$MV/g" "$MANIFEST_PATH"
          sed -i "s/\${CHANGELOG}/$ESCAPED_CHANGELOG/g" "$MANIFEST_PATH"

      - name: 执行 fnpack 打包
        run: |
          cd build_workspace
          ./fnpack build AniRSS
          FPK_FILE=$(ls *.fpk | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "::error::fnpack 未生成 .fpk 文件"
            exit 1
          fi
          FINAL_NAME="AniRSS-${{ needs.check.outputs.manifest_version }}-all.fpk"
          mv "$FPK_FILE" "$FINAL_NAME"
          echo "FINAL_FPK=$FINAL_NAME" >> $GITHUB_ENV

      - name: 上传 fpk 作为 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpk-all
          path: build_workspace/*.fpk
          if-no-files-found: error

      - name: 更新 .last_built_version 并提交
        run: |
          UPSTREAM="${{ needs.check.outputs.upstream_version }}"
          if [ -f fnpack/AniRSS/.last_built_version ] && \
             [ "$(cat fnpack/AniRSS/.last_built_version | tr -d '[:space:]')" = "$UPSTREAM" ]; then
            echo "Already marked as $UPSTREAM"
            exit 0
          fi
          echo "$UPSTREAM" > fnpack/AniRSS/.last_built_version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fnpack/AniRSS/.last_built_version
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore(anirss): mark $UPSTREAM as built"
            git push
          fi

  publish:
    name: 发布到 FnDepot
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: 下载 fpk
        uses: actions/download-artifact@v7
        with:
          path: fpk_files
          merge-multiple: true

      - name: 判断是否执行发布
        id: decide
        env:
          EVENT: ${{ github.event.name }}
          PUB: ${{ github.event.inputs.publish }}
        run: |
          if [ "$EVENT" = "schedule" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "schedule -> try publish"
          elif [ "$PUB" = "true" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "manual + publish=true"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "manual + publish=false"
          fi

      - name: 发布到 FnDepot Release
        if: steps.decide.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::secrets.BUILDBOT 未配置，跳过 FnDepot 发布（如需启用请在仓库 Settings -> Secrets 添加 repo scope 的 PAT）"
            exit 0
          fi

          REPO="shupian35/FnDepot"
          TAG=$(date +'%Y.%-m.%-d')
          TITLE="$TAG 更新"
          MANIFEST_VERSION="${{ needs.check.outputs.manifest_version }}"
          UPSTREAM_VERSION="${{ needs.check.outputs.upstream_version }}"
          CHANGELOG="${{ needs.check.outputs.changelog }}"

          NEW_NOTE="构建 AniRSS 版本 ${MANIFEST_VERSION}（基于上游 v${UPSTREAM_VERSION}）。更新日志：${CHANGELOG}"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            if [ -n "$CURRENT_BODY" ]; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"$NEW_NOTE"
            else
              NEW_BODY="$NEW_NOTE"
            fi
            gh release edit "$TAG" --repo "$REPO" --notes "$NEW_BODY"
          else
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NEW_NOTE"
          fi

          for fpk in fpk_files/*.fpk; do
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" fndepot_repo
          cd fndepot_repo
          if [ ! -f fnpack.json ]; then echo '{}' > fnpack.json; fi
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/AniRSS-${MANIFEST_VERSION}-all.fpk"
          jq --arg version "$MANIFEST_VERSION" \
             --arg changelog "$CHANGELOG" \
             --arg url "$DOWNLOAD_URL" \
             '.AniRSS.version = $version |
              .AniRSS.changelog = $changelog |
              .AniRSS.download_url = $url' \
             fnpack.json > fnpack.json.tmp
          mv fnpack.json.tmp fnpack.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fnpack.json
          git commit -m "chore: update AniRSS to ${MANIFEST_VERSION} (${TAG})"
          git push